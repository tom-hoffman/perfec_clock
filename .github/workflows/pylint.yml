name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install Pylint and CircuitPython stubs to prevent import errors
          pip install pylint circup adafruit-circuitpython-typing
          # If you have a requirements.txt, install it too
          [ -f requirements.txt ] && pip install -r requirements.txt || echo "No requirements.txt"

      - name: Analysing the code with pylint
        run: |
          # Use --recursive=y to find all files, or specify files directly
          pylint --recursive=y .

name: Pylint

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: [actions/checkout@v4](https://github.com)
    - name: Set up Python ${{ matrix.python-version }}
      uses: [actions/setup-python@v5](https://github.com)
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        # Install CircuitPython stubs so Pylint recognizes 'board', 'microcontroller', etc.
        pip install adafruit-circuitpython-typing
    - name: Analysing the code with pylint
      run: |
        # Run pylint on all python files in the repo
        pylint $(git ls-files '*.py')
